services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mmorpg
      POSTGRES_USER: mmorpg
      POSTGRES_PASSWORD: mmorpg
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmorpg -d mmorpg"]
      interval: 2s
      timeout: 2s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30

  backend:
    build: .
    environment:
      ROLE: backend
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://mmorpg:mmorpg@postgres:5432/mmorpg?sslmode=disable
      REDIS_ADDR: redis:6379
    ports:
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    environment:
      ROLE: worker
      DATABASE_URL: postgres://mmorpg:mmorpg@postgres:5432/mmorpg?sslmode=disable
      REDIS_ADDR: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  loadgen:
    image: python:3.14-alpine
    profiles: ["loadgen"]
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: ["python3", "scripts/run_experiments.py", "--base-url", "http://backend:8080", "--ws-url", "ws://backend:8080/ws?last=0-0", "--out-dir", "results/latest"]
    depends_on:
      backend:
        condition: service_started
      worker:
        condition: service_started
